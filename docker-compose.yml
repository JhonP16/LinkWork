version: '3.9'

services:
  # ============================================================
  # POSTGRESQL
  # ============================================================
  postgres:
    image: postgres:16-alpine
    container_name: empleabilidad-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME:-empleabilidad}
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres123}
      PGDATA: /data/postgres
    volumes:
      - postgres_data:/data/postgres
      - ./database/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
    ports:
      - "5432:5432"
    networks:
      - empleabilidad-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres} -d ${DB_NAME:-empleabilidad}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ============================================================
  # BACKEND (Node.js + Express)
  # ============================================================
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: empleabilidad-backend
    restart: unless-stopped
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      PORT: 3000
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: ${DB_NAME:-empleabilidad}
      DB_USER: ${DB_USER:-postgres}
      DB_PASSWORD: ${DB_PASSWORD:-postgres123}
      JWT_SECRET: ${JWT_SECRET:-empleabilidad_jwt_secret_super_secure_2024}
      SCORING_URL: http://scoring:8001
      N8N_WEBHOOK_URL: http://n8n:5678/webhook/employment-search
      CORS_ORIGIN: ${CORS_ORIGIN:-*}
      LOG_LEVEL: ${LOG_LEVEL:-info}
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - empleabilidad-net
    volumes:
      - ./backend/src:/app/src:ro
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:3000/api/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5

  # ============================================================
  # SCORING MICROSERVICE (Python + FastAPI)
  # ============================================================
  scoring:
    build:
      context: ./scoring
      dockerfile: Dockerfile
    container_name: empleabilidad-scoring
    restart: unless-stopped
    environment:
      LOG_LEVEL: info
    ports:
      - "8001:8001"
    networks:
      - empleabilidad-net
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:8001/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5

  # ============================================================
  # FRONTEND (React + Vite → Nginx)
  # ============================================================
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: empleabilidad-frontend
    restart: unless-stopped
    ports:
      - "3001:80"
    depends_on:
      - backend
    networks:
      - empleabilidad-net

  # ============================================================
  # N8N (Workflow Automation)
  # ============================================================
  n8n:
    image: n8nio/n8n:latest
    container_name: empleabilidad-n8n
    restart: unless-stopped
    environment:
      DB_TYPE: postgresdb
      DB_POSTGRESDB_HOST: postgres
      DB_POSTGRESDB_PORT: 5432
      DB_POSTGRESDB_DATABASE: n8n
      DB_POSTGRESDB_USER: ${DB_USER:-postgres}
      DB_POSTGRESDB_PASSWORD: ${DB_PASSWORD:-postgres123}
      N8N_BASIC_AUTH_ACTIVE: "true"
      N8N_BASIC_AUTH_USER: ${N8N_USER:-admin}
      N8N_BASIC_AUTH_PASSWORD: ${N8N_PASSWORD:-admin123}
      N8N_HOST: localhost
      N8N_PORT: 5678
      N8N_PROTOCOL: http
      WEBHOOK_URL: http://localhost:5678
      GENERIC_TIMEZONE: America/Bogota
      TZ: America/Bogota
    ports:
      - "5678:5678"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - n8n_data:/home/node/.n8n
      - ./n8n:/home/node/n8n-imports:ro
    networks:
      - empleabilidad-net

# ============================================================
# VOLUMES & NETWORKS
# ============================================================
volumes:
  postgres_data:
    driver: local
  n8n_data:
    driver: local

networks:
  empleabilidad-net:
    driver: bridge
